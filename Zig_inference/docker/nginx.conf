events { worker_connections 1024; }
http {
    upstream inference_cluster {
        server shard-0:8080;
        server shard-1:8080;
        server shard-2:8080;
        server shard-3:8080;
    }
    server {
        listen 80;
        location /generate { proxy_pass http://inference_cluster/generate; }
        location /health { return 200 '{"status":"healthy"}'; add_header Content-Type application/json; }
    }
}
